SPECIFICATION Spec
INVARIANT Inv_AckOnlyAuthorizesAwaitingAck
INVARIANT Inv_ForbiddenStatesRemainBlocked

CONSTANTS
  DecisionStates = {
    "INFO_INSUFFICIENT",
    "AWAITING_ACK",
    "AUTHORIZED",
    "BLOCKED",
    "DEGRADED"
  }
  AwaitingAckState = "AWAITING_ACK"
  AuthorizedState = "AUTHORIZED"
  ForbiddenAckStates = {"INFO_INSUFFICIENT", "BLOCKED", "DEGRADED"}
  ConstraintUniverse = {"RISK_ACK_REQUIRED", "OWNER_REQUIRED", "SOURCE_REQUIRED"}
  AckRequiredConstraint = "RISK_ACK_REQUIRED"
