name: verification

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  claims:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download TLC tools
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\tools | Out-Null
          Invoke-WebRequest `
            -Uri https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar `
            -OutFile .\tools\tla2tools.jar

      - name: Restore
        run: dotnet restore .\ClearanceGate.slnx

      - name: Check claim traceability
        shell: pwsh
        run: .\scripts\check-claim-traceability.ps1

      - name: Check delivery handoff assets
        shell: pwsh
        run: .\scripts\check-delivery-handoff.ps1

      - name: Check controlled pilot readiness assets
        shell: pwsh
        run: .\scripts\check-controlled-pilot-readiness.ps1

      - name: Check caller integration handoff assets
        shell: pwsh
        run: .\scripts\check-caller-integration-handoff.ps1

      - name: Check real caller intake handoff assets
        shell: pwsh
        run: .\scripts\check-real-caller-intake-handoff.ps1

      - name: Check real caller promotion handoff assets
        shell: pwsh
        run: .\scripts\check-real-caller-promotion-handoff.ps1

      - name: Check near-real pilot handoff assets
        shell: pwsh
        run: .\scripts\check-near-real-pilot-handoff.ps1

      - name: Generate profile TLC configs
        shell: pwsh
        run: .\scripts\generate-all-profile-tla-configs.ps1

      - name: Runtime claim tests
        run: >
          dotnet test .\tests\ClearanceGate.Api.Tests\ClearanceGate.Api.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=runtime-claims.trx"
          --results-directory .\artifacts\test-results

      - name: Publish release bundle
        shell: pwsh
        run: .\scripts\publish-release-bundle.ps1

      - name: Validate release bundle
        shell: pwsh
        run: .\scripts\validate-release-bundle.ps1

      - name: Prepare caller integration review
        shell: pwsh
        run: .\scripts\prepare-caller-integration-review.ps1

      - name: Prepare real caller rehearsal review
        shell: pwsh
        run: >
          .\scripts\prepare-real-caller-rehearsal.ps1
          -AuthorizeInputPath .\examples\pilot-adapter\change-control-request.json
          -AcknowledgeInputPath .\examples\pilot-adapter\change-control-ack.json
          -Profile itops_deployment_v1

      - name: Initialize real caller intake
        shell: pwsh
        run: >
          .\scripts\initialize-real-caller-intake.ps1
          -CallerSystem example-caller
          -Profile itops_deployment_v1
          -ActionDescription "Example gated deployment action"

      - name: Create sample real caller intake
        shell: pwsh
        run: .\scripts\create-sample-real-caller-intake.ps1 -Profile itops_deployment_v1

      - name: Validate sample real caller intake
        shell: pwsh
        run: >
          .\scripts\validate-real-caller-intake-package.ps1
          -IntakeRoot (Get-ChildItem .\artifacts\real-caller-intake -Directory | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1).FullName
          -RequireReadyStatus

      - name: Promote sample real caller intake
        shell: pwsh
        run: >
          .\scripts\promote-real-caller-intake.ps1
          -IntakeRoot (Get-ChildItem .\artifacts\real-caller-intake -Directory | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1).FullName

      - name: Run near-real pilot dry-run
        shell: pwsh
        run: .\scripts\run-near-real-pilot-dry-run.ps1

      - name: TLC green models
        shell: pwsh
        run: .\scripts\run-tlc.ps1

      - name: TLC red models
        shell: pwsh
        run: .\scripts\run-tlc.ps1 -IncludeRed

      - name: Publish TLC summary
        shell: pwsh
        run: Get-Content .\artifacts\tlc\summary.md >> $env:GITHUB_STEP_SUMMARY

      - name: Publish runtime claim summary
        shell: pwsh
        run: |
          .\scripts\write-runtime-claim-summary.ps1 `
            -TrxPath .\artifacts\test-results\runtime-claims.trx `
            -OutputPath .\artifacts\test-results\summary.md
          Get-Content .\artifacts\test-results\summary.md >> $env:GITHUB_STEP_SUMMARY

      - name: Publish release readiness summary
        shell: pwsh
        run: |
          .\scripts\write-release-readiness-summary.ps1 `
            -OutputPath .\artifacts\release-readiness\summary.md
          Get-Content .\artifacts\release-readiness\summary.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload TLC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tlc-logs
          path: artifacts/tlc

      - name: Upload generated profile TLC configs
        uses: actions/upload-artifact@v4
        with:
          name: generated-profile-tla-configs
          path: generated/tla

      - name: Upload runtime claim artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-claim-results
          path: artifacts/test-results

      - name: Upload release bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: artifacts/publish

      - name: Upload release readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness
          path: artifacts/release-readiness

      - name: Upload caller integration review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caller-integration-review
          path: artifacts/caller-integration-review

      - name: Upload real caller rehearsal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real-caller-rehearsal
          path: artifacts/real-caller-rehearsal

      - name: Upload real caller intake artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real-caller-intake
          path: artifacts/real-caller-intake

      - name: Upload real caller promotion artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real-caller-promotion
          path: artifacts/real-caller-promotion

      - name: Upload near-real pilot dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: near-real-pilot-dry-run
          path: artifacts/near-real-pilot-dry-run
